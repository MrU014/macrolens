<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1e24"/>
      <stop offset="1" stop-color="#0a0c0f"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff9a52"/>
      <stop offset="1" stop-color="#e8833a"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9ecfaa"/>
      <stop offset="1" stop-color="#6fa37c"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="116" fill="url(#bg)"/>

  <!-- progress ring (open arc, like the calorie ring) -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="30"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="url(#ring)" stroke-width="30"
          stroke-linecap="round" stroke-dasharray="942" stroke-dashoffset="207"
          transform="rotate(-90 256 256)"/>

  <!-- leaf mark in the centre -->
  <path d="M256 168 C314 196 326 268 268 332 C262 338 254 340 248 338 C204 296 198 222 256 168 Z"
        fill="url(#leaf)"/>
  <path d="M256 184 C256 240 252 296 256 330" fill="none" stroke="#0c0e11" stroke-width="9"
        stroke-linecap="round" opacity="0.5"/>
</svg>
