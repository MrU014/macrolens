<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0c0e11">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>MacroLens</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/screens.css">
</head>
<body>
  <div class="ambient ambient-green"></div>
  <div class="ambient ambient-orange"></div>

  <main id="app" class="app-scroll"><!-- screens render here --></main>

  <nav class="tabbar">
    <button class="tab active" data-tab="home"><span class="tab-ico">⌂</span><span class="tab-lbl">Home</span></button>
    <button class="tab" data-tab="history"><span class="tab-ico">🗓</span><span class="tab-lbl">History</span></button>
    <button id="fab" class="fab" aria-label="Scan meal">⌖</button>
    <button class="tab" data-tab="analytics"><span class="tab-ico">📈</span><span class="tab-lbl">Analytics</span></button>
    <button class="tab" data-tab="profile"><span class="tab-ico">👤</span><span class="tab-lbl">Profile</span></button>
  </nav>

  <div id="sheet-root"></div>
  <div id="scan-root"></div>
  <div id="toast-root"></div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
